const COLORS = {
  Alex:"#3B82F6", Tom:"#10B981", Emma:"#F59E0B", Ben:"#8B5CF6",
  Sam:"#EF4444", Léa:"#EC4899", Jake:"#0EA5E9", Mia:"#F97316",
  Lola:"#6366F1", Jade:"#14B8A6",
};
const getColor = n => COLORS[n] || "#6B7280";

function App() {
  const [wIdx, setWIdx] = useState(0);
  const [dIdx, setDIdx] = useState(0);
  const [showV, setShowV] = useState(false);
  const [showT, setShowT] = useState(false);

  const week = weeks[wIdx];
  const day = week.days[dIdx];
  const total = wIdx * 7 + dIdx + 1;
  const pct = Math.round((total / 49) * 100);

  function next() {
    if (dIdx < 6) setDIdx(dIdx + 1);
    else if (wIdx < 6) { setWIdx(wIdx + 1); setDIdx(0); }
    setShowV(false); setShowT(false);
  }
  function prev() {
    if (dIdx > 0) setDIdx(dIdx - 1);
    else if (wIdx > 0) { setWIdx(wIdx - 1); setDIdx(6); }
    setShowV(false); setShowT(false);
  }

  const isFirst = wIdx === 0 && dIdx === 0;
  const isLast = wIdx === 6 && dIdx === 6;

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0f0f1a,#1a1a2e,#0f0f1a)",fontFamily:"Georgia,serif",color:"#f0f0f0",padding:"12px"}}>
      <div style={{textAlign:"center",marginBottom:"16px"}}>
        <div style={{fontSize:"10px",letterSpacing:"4px",textTransform:"uppercase",color:"#666",marginBottom:"4px"}}>English Practice</div>
        <h1 style={{margin:0,fontSize:"22px",fontWeight:"normal",color:"#fff"}}>7 Weeks of Dialogues</h1>
        <div style={{fontSize:"11px",color:"#666",marginTop:"3px"}}>Day {total} of 49</div>
        <div style={{height:"3px",background:"#222",borderRadius:"2px",marginTop:"8px",maxWidth:"280px",margin:"8px auto 0"}}>
          <div style={{height:"3px",width:`${pct}%`,background:week.color,borderRadius:"2px",transition:"width 0.4s"}}/>
        </div>
      </div>

      <div style={{display:"flex",gap:"5px",justifyContent:"center",flexWrap:"wrap",marginBottom:"10px"}}>
        {weeks.map((w,i) => (
          <button key={i} onClick={() => {setWIdx(i);setDIdx(0);setShowV(false);setShowT(false);}}
            style={{background:wIdx===i?w.color:"#1e1e30",color:wIdx===i?"#fff":"#555",border:`1px solid ${wIdx===i?w.color:"#333"}`,borderRadius:"20px",padding:"3px 8px",fontSize:"11px",cursor:"pointer"}}>
            {w.emoji} S{i+1}
          </button>
        ))}
      </div>

      <div style={{display:"flex",gap:"5px",justifyContent:"center",marginBottom:"14px"}}>
        {week.days.map((_,i) => (
          <button key={i} onClick={() => {setDIdx(i);setShowV(false);setShowT(false);}}
            style={{width:"28px",height:"28px",borderRadius:"50%",background:dIdx===i?week.color:"#1e1e30",color:dIdx===i?"#fff":"#555",border:`1px solid ${dIdx===i?week.color:"#333"}`,fontSize:"11px",cursor:"pointer",fontWeight:dIdx===i?"bold":"normal"}}>
            {i+1}
          </button>
        ))}
      </div>

      <div style={{maxWidth:"560px",margin:"0 auto"}}>
        <div style={{background:`linear-gradient(135deg,${week.color}22,${week.color}0a)`,border:`1px solid ${week.color}44`,borderRadius:"14px 14px 0 0",padding:"14px 16px 10px"}}>
          <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"3px"}}>
            <span style={{fontSize:"18px"}}>{week.emoji}</span>
            <div>

              <div style={{fontSize:"17px",fontWeight:"bold",color:"#fff",marginTop:"2px"}}>{day.title}</div>
            </div>
          </div>
          <div style={{fontSize:"11px",color:"#777",fontStyle:"italic"}}>🎯 {day.theme} · {day.characters.join(", ")}</div>
        </div>

        <div style={{background:"#141420",border:`1px solid ${week.color}22`,borderTop:"none",padding:"14px 16px"}}>
          {day.lines.map((line, i) => {
            const left = i % 2 === 0;
            const c = getColor(line.speaker);
            return (
              <div key={i} style={{display:"flex",justifyContent:left?"flex-start":"flex-end",marginBottom:"10px",gap:"7px",alignItems:"flex-end"}}>
                {left && <div style={{width:"26px",height:"26px",borderRadius:"50%",background:`${c}33`,border:`2px solid ${c}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:"bold",color:c,flexShrink:0}}>{line.speaker[0]}</div>}
                <div style={{maxWidth:"78%"}}>
                  <div style={{fontSize:"9px",color:c,marginBottom:"2px",textAlign:left?"left":"right",letterSpacing:"0.5px"}}>{line.speaker}</div>

                </div>
                {!left && <div style={{width:"26px",height:"26px",borderRadius:"50%",background:"#1e1e30",border:"2px solid #444",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",fontWeight:"bold",color:"#777",flexShrink:0}}>{line.speaker[0]}</div>}
              </div>
            );
          })}
        </div>

        <div style={{background:"#0e0e1c",border:`1px solid ${week.color}22`,borderTop:"none",padding:"10px 16px",display:"flex",gap:"7px"}}>
          <button onClick={() => setShowV(!showV)} style={{flex:1,background:showV?`${week.color}22`:"#1a1a28",border:`1px solid ${showV?week.color:"#333"}`,borderRadius:"8px",padding:"7px",color:showV?week.color:"#555",fontSize:"11px",cursor:"pointer"}}>📚 Vocabulary</button>
          <button onClick={() => setShowT(!showT)} style={{flex:1,background:showT?"#f59e0b22":"#1a1a28",border:`1px solid ${showT?"#f59e0b":"#333"}`,borderRadius:"8px",padding:"7px",color:showT?"#f59e0b":"#555",fontSize:"11px",cursor:"pointer"}}>💡 Tip</button>
        </div>

        {showV && (
          <div style={{background:`${week.color}0a`,border:`1px solid ${week.color}33`,borderTop:"none",padding:"12px 16px",display:"flex",flexWrap:"wrap",gap:"5px"}}>
            {day.vocab.map((v,i) => <span key={i} style={{background:`${week.color}22`,border:`1px solid ${week.color}55`,borderRadius:"20px",padding:"2px 9px",fontSize:"11px",color:week.color}}>{v}</span>)}
          </div>
        )}

        {showT && (
          <div style={{background:"#f59e0b0a",border:"1px solid #f59e0b33",borderTop:"none",padding:"12px 16px",fontSize:"12px",color:"#d4a84b",lineHeight:"1.6",fontStyle:"italic"}}>💡 {day.tip}</div>
        )}

        <div style={{background:"#0c0c18",border:`1px solid ${week.color}22`,borderTop:"none",borderRadius:"0 0 14px 14px",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <button onClick={prev} disabled={isFirst} style={{background:"transparent",border:"1px solid #333",borderRadius:"8px",padding:"7px 12px",color:isFirst?"#333":"#777",fontSize:"12px",cursor:isFirst?"default":"pointer"}}>← Préc.</button>
          <span style={{fontSize:"10px",color:"#333"}}>{total} / 49</span>
          <button onClick={next} disabled={isLast} style={{background:isLast?"transparent":week.color,border:`1px solid ${week.color}`,borderRadius:"8px",padding:"7px 12px",color:isLast?"#333":"#fff",fontSize:"12px",cursor:isLast?"default":"pointer",fontWeight:"500"}}>Suiv. →</button>
        </div>
      </div>
      <div style={{textAlign:"center",marginTop:"16px",fontSize:"10px",color:"#2a2a3a"}}>Bonne pratique ! 🇬🇧</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
